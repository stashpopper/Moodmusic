<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 80" width="250" height="80">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5ef0" />
      <stop offset="100%" stop-color="#ff7eb3" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background glow effect -->
  <ellipse cx="125" cy="40" rx="100" ry="30" 
           fill="url(#gradient)" 
           opacity="0.1" 
           filter="url(#glow)"/>
  
  <!-- Musical wave - more prominent -->
  <path d="M20,50 Q40,20 60,50 T100,50 T140,50 T180,50 T220,50" 
        stroke="url(#gradient)" 
        stroke-width="4" 
        fill="none" 
        stroke-linecap="round" 
        opacity="0.9"/>
  
  <!-- MoodMusic text - larger and bolder -->
  <text x="70" y="38" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="bold" 
        fill="url(#gradient)" 
        letter-spacing="-1">
    Mood
  </text>
  
  <text x="70" y="62" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="bold" 
        fill="url(#gradient)" 
        letter-spacing="-1">
    Music
  </text>
  
  <!-- Enhanced musical note -->
  <g transform="translate(45, 30)" filter="url(#glow)">
    <!-- Note head -->
    <ellipse cx="8" cy="10" rx="6" ry="4" fill="#ff7eb3" />
    
    <!-- Note stem -->
    <path d="M14,8 L14,22" stroke="#7c5ef0" stroke-width="2.5" fill="none" />
    
    <!-- Note flag -->
    <path d="M14,8 Q18,6 22,8" stroke="#ff7eb3" stroke-width="2" fill="none" />
  </g>
  
  <!-- Decorative elements -->
  <circle cx="210" cy="25" r="3" fill="#ff7eb3" opacity="0.6" />
  <circle cx="200" cy="55" r="2" fill="#7c5ef0" opacity="0.6" />
</svg>