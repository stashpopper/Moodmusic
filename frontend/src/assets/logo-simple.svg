<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="180" height="50">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5ef0" />
      <stop offset="100%" stop-color="#ff7eb3" />
    </linearGradient>
  </defs>
  
  <!-- Compact musical wave -->
  <path d="M10,25 Q20,10 30,25 Q40,40 50,25" 
        stroke="url(#gradient)" 
        stroke-width="2.5" 
        fill="none" 
        stroke-linecap="round"/>
  
  <text x="60" y="22" 
        font-family="Arial, sans-serif" 
        font-size="18" 
        font-weight="bold" 
        fill="url(#gradient)" 
        letter-spacing="-0.5">
    MoodMusic
  </text>
  
  <!-- Musical note icon -->
  <circle cx="45" cy="20" r="2.5" fill="#ff7eb3" />
  <path d="M50,18 L50,24" stroke="#7c5ef0" stroke-width="1.5" />
</svg>